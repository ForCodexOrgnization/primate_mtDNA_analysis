# Preprocessing QC configuration for variant-calling result collection and
# coordinate liftover. Edit paths before running on a real dataset.

collect_variant_calling:
  # Root directory with one subdirectory per sample.
  input_root: /home/lt692/scratch_pi_njl27/lt692/primate_results_test/new

  # Destination for standardized collected inputs and reports.
  outdir: results/qc/collected_variant_calling_results

  # Optional sample metadata table. This can be the same two-column sample/species
  # file used by coordinate_liftover.paths.sample_ref_file.
  metadata: config/sample_ref_file.tsv
  metadata_sample_column: sample
  metadata_species_column: species

  # Coverage and heteroplasmy/homoplasmy thresholds.
  coverage_threshold: 100
  low_hetero: 0.05
  low_homo: 0.95
  min_vcf_dp: 100

  # Only PASS variants with sample FORMAT DP > min_vcf_dp are counted.
  copy_files: false
  allow_single_cov: false

  # Optional explicit mtCN columns. Leave empty/null to use robust common aliases.
  mtcn_mt_column:
  mtcn_nuclear_column:
  mtcn_mtcn_column:

global_anchor_discovery:
  output_dir: results/qc/global_anchor
  sample_ref_file: config/sample_ref_file.tsv
  human_fasta: data/reference_tables/human_chrM.fa

  min_reference_length: 14000
  max_reference_length: 19000
  max_n_fraction: 0.02

  candidate_window_size: 31
  min_anchor_column_occupancy: 0.98
  min_window_mean_occupancy: 0.95
  max_window_gap_fraction: 0.05
  max_homopolymer_run: 6

  aligner: mafft
  aligner_options: "--auto --quiet"
  threads: 8
  allow_simple_alignment_fallback: false

  enable_family_fallback: true
  family_column: family
  min_family_reference_count: 2

coordinate_liftover:
  paths:
    # Directory for all generated coordinate-liftover outputs.
    output_dir: results/qc/coordinate_liftover

    # Raw, unrotated canonical human chrM FASTA.
    human_fasta: data/reference_tables/human_chrM.fa

    # TSV with one row per sample. Minimal required columns: sample, species.
    # Explicit columns are also supported: species_fasta, vcf, cov.
    # Optional columns: species_chrom, rotate_anchor, target_sequence.
    sample_ref_file: config/sample_ref_file.tsv

    # Input directories used when sample_ref_file contains only sample/species.
    # vcf_dir and cov_dir should point directly at the standardized outputs
    # produced by collect_variant_calling.outdir.
    species_fasta_dir: /home/lt692/scratch_pi_njl27/lt692/primate_mtDNA_analysis/references/variant_calling/Ref_chrM
    species_fasta_extensions: .fa,.fasta,.fna
    vcf_dir: results/qc/collected_variant_calling_results/collected_vcf
    vcf_pattern: "{sample}*.vcf.gz"
    cov_dir: results/qc/collected_variant_calling_results/collected_cov
    cov_pattern: "{sample}*.tsv"

    # Alternative to sample_ref_file: comma-separated sample names plus per-sample
    # sections under coordinate_liftover.samples_by_name.
    samples: ""
    rotate_pos_file: ""

  coordinates:
    # Human canonical chrM length and restore offset used to convert rotated human
    # coordinates back to canonical coordinates. For rCRS chrM, length is 16569.
    human_len: 16569
    human_restore_offset: 0
    target_chrom: chrM

    # Production reference-level anchor table produced by discover_global_liftover_anchor.py.
    anchor_positions_file: results/qc/global_anchor/reference_anchor_positions.tsv

    # Optional 1-based anchor for human rotation. Empty normally uses the
    # human_anchor_original_position from the validated anchor table.
    human_rotate_anchor: ""

  anchor:
    require_validated_anchor: true
    verify_sequence_sha256: true
    allow_pairwise_anchor_fallback: false
    allow_anchor_position_one_fallback: false

  fasta:
    # Optional sequence identifier to select from multi-record human FASTA.
    human_target_sequence: ""
    # Default target sequence name used in prepared FASTAs.
    human_sequence_name: human_chrM
    species_sequence_name_template: "{sample}_chrM"

  alignment:
    aligner: mafft
    aligner_options: --auto --quiet
    # Try loading the optional HPC conda environment before running the aligner.
    use_conda_env: true
    module_load: miniconda/24.11.3
    conda_env: mafft_env
    # If true and the external aligner is unavailable, write a deterministic simple
    # ungapped pairwise alignment so small smoke tests can still exercise the module.
    allow_simple_alignment_fallback: true

  liftover:
    check_ref_against_human_fasta: true

    # Automatically swap REF/ALT for simple split biallelic SNVs when
    # the target human reference allele equals the source ALT.
    enable_ref_alt_flip: true

    # Stop the workflow when target REF is neither source REF nor source ALT.
    fail_on_unresolvable_target_ref: false

    # Deprecated compatibility option. Keep reading this if present.
    fail_on_ref_mismatch: false

  # Optional explicit per-sample entries when paths.samples is set. Example:
  # samples_by_name:
  #   SAMPLE_NAME:
  #     species: Pan_troglodytes
  #     species_fasta: /path/to/species.fa
  #     vcf: /path/to/sample.vcf.gz
  #     cov: /path/to/sample.coverage.tsv
  samples_by_name: {}
