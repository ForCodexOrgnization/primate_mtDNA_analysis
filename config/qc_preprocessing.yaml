# Preprocessing QC configuration for variant-calling result collection and
# coordinate liftover. Edit paths before running on a real dataset.

collect_variant_calling:
  # Root directory with one subdirectory per sample.
  input_root: /home/lt692/scratch_pi_njl27/lt692/primate_results_test/new

  # Destination for standardized collected inputs and reports.
  outdir: results/qc/collected_variant_calling_results

  # Optional sample metadata table. This can be the same two-column sample/species
  # file used by coordinate_liftover.paths.sample_ref_file.
  metadata: config/sample_ref_file.tsv
  metadata_sample_column: sample
  metadata_species_column: species

  # Coverage and heteroplasmy/homoplasmy thresholds.
  coverage_threshold: 100
  low_hetero: 0.05
  low_homo: 0.95
  min_vcf_dp: 100

  # Only PASS variants with sample FORMAT DP > min_vcf_dp are counted.
  copy_files: false
  allow_single_cov: false

  # Optional explicit mtCN columns. Leave empty/null to use robust common aliases.
  mtcn_mt_column:
  mtcn_nuclear_column:
  mtcn_mtcn_column:

global_anchor_discovery:
  output_dir: results/qc/global_anchor
  sample_ref_file: config/sample_ref_file.tsv
  human_fasta: data/reference_tables/human_chrM.fa

  min_reference_length: 14000
  max_reference_length: 19000
  max_n_fraction: 0.02

  candidate_window_size: 31
  min_anchor_column_occupancy: 0.98
  min_window_mean_occupancy: 0.95
  max_window_gap_fraction: 0.05
  max_homopolymer_run: 6

  aligner: mafft
  aligner_options: "--auto --quiet"
  threads: 8
  use_conda_env: true
  module_load: miniconda/24.11.3
  conda_env: mafft_env
  allow_simple_alignment_fallback: false

  enable_family_fallback: true
  family_column: family
  min_family_reference_count: 2

coordinate_liftover:
  paths:
    # Directory for all generated coordinate-liftover outputs.
    output_dir: results/qc/coordinate_liftover

    # Raw, unrotated canonical human chrM FASTA.
    human_fasta: data/reference_tables/human_chrM.fa

    # TSV with one row per sample. Minimal required columns: sample, species.
    # Explicit columns are also supported: species_fasta, vcf, cov.
    # Optional columns: species_chrom, rotate_anchor, target_sequence.
    sample_ref_file: config/sample_ref_file.tsv

    # Input directories used when sample_ref_file contains only sample/species.
    # vcf_dir and cov_dir should point directly at the standardized outputs
    # produced by collect_variant_calling.outdir.
    species_fasta_dir: /home/lt692/scratch_pi_njl27/lt692/primate_mtDNA_analysis/references/variant_calling/Ref_chrM
    species_fasta_extensions: .fa,.fasta,.fna
    vcf_dir: results/qc/collected_variant_calling_results/collected_vcf
    vcf_pattern: "{sample}.round2.original_coords.clean.final.split.vcf.gz,{sample}.round2.original_coords.clean.final.split.vcf"
    cov_dir: results/qc/collected_variant_calling_results/collected_cov
    cov_pattern: "{sample}.merged.max_depth.per_base_coverage.tsv"

    # Alternative to sample_ref_file: comma-separated sample names plus per-sample
    # sections under coordinate_liftover.samples_by_name.
    samples: ""
    rotate_pos_file: ""

  coordinates:
    # Human canonical chrM length and restore offset used to convert rotated human
    # coordinates back to canonical coordinates. For rCRS chrM, length is 16569.
    human_len: 16569
    human_restore_offset: 0
    target_chrom: chrM

    # Production reference-level anchor table produced by discover_global_liftover_anchor.py.
    anchor_positions_file: results/qc/global_anchor/reference_anchor_positions.tsv

    # Optional 1-based anchor for human rotation. Empty normally uses the
    # human_anchor_original_position from the validated anchor table.
    human_rotate_anchor: ""

  anchor:
    require_validated_anchor: true
    verify_sequence_sha256: true
    allow_pairwise_anchor_fallback: false
    allow_anchor_position_one_fallback: false

  fasta:
    # Optional sequence identifier to select from multi-record human FASTA.
    human_target_sequence: ""
    # Default target sequence name used in prepared FASTAs.
    human_sequence_name: human_chrM
    species_sequence_name_template: "{sample}_chrM"

  alignment:
    aligner: mafft
    aligner_options: --auto --quiet
    threads: 8
    # Try loading the optional HPC conda environment before running the aligner.
    use_conda_env: true
    module_load: miniconda/24.11.3
    conda_env: mafft_env
    # If true and the external aligner is unavailable, write a deterministic simple
    # ungapped pairwise alignment so small smoke tests can still exercise the module.
    allow_simple_alignment_fallback: true

  liftover:
    check_ref_against_human_fasta: true

    # Automatically swap REF/ALT for simple split biallelic SNVs when
    # the target human reference allele equals the source ALT.
    enable_ref_alt_flip: true

    # Stop the workflow when target REF is neither source REF nor source ALT.
    fail_on_unresolvable_target_ref: false

    # Deprecated compatibility option. Keep reading this if present.
    fail_on_ref_mismatch: false

  # Optional explicit per-sample entries when paths.samples is set. Example:
  # samples_by_name:
  #   SAMPLE_NAME:
  #     species: Pan_troglodytes
  #     species_fasta: /path/to/species.fa
  #     vcf: /path/to/sample.vcf.gz
  #     cov: /path/to/sample.coverage.tsv
  samples_by_name: {}

# Generates codon annotations consumed by codon_match.paths.all_primate_position_codon_table.
build_primate_codon_table:
  paths:
    sample_ref_file: config/sample_ref_file.tsv
    genbank_dir: data/reference_tables/primate_genbank
    output_table: data/reference_tables/all_primate_position_codon_table.tsv
    failed_downloads_table: results/qc/codon_table_build/failed_genbank_downloads.tsv
    summary_table: results/qc/codon_table_build/primate_codon_table_build_summary.tsv
    reference_summary_file: references/manifests/reference_materialization_manifest.resolved.tsv
    reference_summary_fallback_files: "references/manifests/reference_materialization_manifest.tsv,references/manifests/in_house_score_reference_inputs.tsv"
    species_fasta_dir: /home/lt692/scratch_pi_njl27/lt692/primate_mtDNA_analysis/references/variant_calling/Ref_chrM
    species_fasta_extensions: .fa,.fasta,.fna,.fa.gz,.fasta.gz,.fna.gz
  settings:
    accession_columns: "accession,accession_version,reference_id,seq_name"
    reference_summary_species_columns: "target_species,final_chrM_species,preprint_REFERENCE_SPECIES,final_wg_ref_species"
    reference_summary_accession_columns: "final_chrM_genbank_accn,final_chrM_refseq_accn,final_chrM_accession,chrM_source_accession"
    reference_summary_path_columns: "chrM_expected_output_fasta,chrM_fasta_path,wg_expected_output_fasta,wg_fasta_path"
    infer_accession_from_fasta: true
    accession_regex: "([A-Z]{1,3}_[0-9]+(?:\\.[0-9]+)?)"
    species_column: species
    sample_column: sample
    email: ""
    force_download: false
    skip_existing_genbank: true
    sleep_seconds: 0.34
    rettype: gb
    retmode: text
    prefer_annotation_source: GenBank
    fallback_annotation_source: MITOS2
    use_mitos2_if_genbank_fails: true
    compare_genbank_and_mitos2: true

codon_match:
  paths:
    input_vcf_dir: results/qc/coordinate_liftover/vcf_lifted_raw
    output_dir: results/qc/codon_match
    reports_dir: results/qc/codon_match/reports
    # Generated by build_primate_codon_table.
    all_primate_position_codon_table: data/reference_tables/all_primate_position_codon_table.tsv
    human_codon_table: data/reference_tables/human_codon_table.tsv
  settings:
    enabled: true
    strict_phase_match: true
    input_vcf_pattern: "{sample}.lifted.raw.vcf"
    output_suffix: ".lifted.codon.vcf"
    write_summary: true
    pass_only: false
trna_match:
  paths:
    input_vcf_dir: results/qc/codon_match/vcf_codon
    fallback_input_vcf_dir: results/qc/coordinate_liftover/vcf_lifted_raw
    output_dir: results/qc/trna_match
    reports_dir: results/qc/trna_match/reports
    coordinate_map_dir: results/qc/coordinate_liftover/maps
    human_trna_index: data/reference_tables/human.trna_position_index.tsv.gz
    species_trna_index_dir: results/qc/trna_match/trna_index
    species_trna_index_template: "{species_trna_index_dir}/{sample}.trna_position_index.tsv.gz"
    human_trnascan_out: data/reference_tables/human.trnascan.out
    human_trnascan_ss: data/reference_tables/human.trnascan.ss
    species_trnascan_out_template: results/qc/trna_match/trnascan/{sample}.trnascan.out
    species_trnascan_ss_template: results/qc/trna_match/trnascan/{sample}.trnascan.ss
    species_trnascan_prefix_template: results/qc/trna_match/trnascan/{sample}
  settings:
    enabled: true
    input_vcf_pattern: "{sample}.lifted.codon.vcf"
    fallback_input_vcf_pattern: "{sample}.lifted.raw.vcf"
    output_suffix: ".lifted.codon.trna.vcf"
    run_trnascan_if_missing: false
    trnascan_bin: tRNAscan-SE
    trnascan_mode: mito_mammal
    trnascan_threads: 4
    trnascan_extra_args: ""
    species_trna_coord_space: original
    species_trna_chrom_norm: none
    human_trna_chrom_norm: none
    species_vcf_chrom_norm: none
    human_vcf_chrom_norm: none
    species_trna_lookup_ignore_chrom: false
    human_trna_lookup_ignore_chrom: false
    run_trna_gene_qc: true
    write_summary: true
    pass_only: false
    require_compensated_for_strict_stem: true
rrna_match:
  paths:
    input_vcf_dir: results/qc/trna_match/vcf_trna
    fallback_codon_vcf_dir: results/qc/codon_match/vcf_codon
    fallback_raw_vcf_dir: results/qc/coordinate_liftover/vcf_lifted_raw
    output_dir: results/qc/rrna_match
    reports_dir: results/qc/rrna_match/reports
    coordinate_map_dir: results/qc/coordinate_liftover/maps
    human_rrna_table: data/reference_tables/human_rrna_regions.tsv
    species_rrna_table: data/reference_tables/species_rrna_regions.tsv
  settings:
    enabled: true
    input_vcf_pattern: "{sample}.lifted.codon.trna.vcf"
    fallback_codon_vcf_pattern: "{sample}.lifted.codon.vcf"
    fallback_raw_vcf_pattern: "{sample}.lifted.raw.vcf"
    output_suffix: ".lifted.codon.trna.rrna.vcf"
    require_same_rrna_gene: true
    require_region_overlap: true
    # Enable after supplying this human-reference-guided table. Missing table is
    # a clear error while enabled; set false to retain interval-only annotation.
    use_rrna_structure_table: false
    human_rrna_structure_table: data/reference_tables/human_rrna_structure.tsv
    species_rrna_structure_table: ""
    require_pair_pos_match_for_high_conf_stem: true
    write_summary: true
    pass_only: false
environment:
  # Used only by the GenBank/codon-table build wrapper; this keeps Biopython
  # separate from the MAFFT conda environment.
  biopython:
    use_module: true
    module_load: Biopython/1.83-foss-2022b
  mafft:
    module_load: miniconda/24.11.3
    conda_env: mafft_env
    executable: mafft
  trnascan:
    module_load: miniconda/24.11.3
    conda_env: trnascan_env
    executable: tRNAscan-SE
  python:
    executable: python
    required_version: ">=3.9"

mitos2_annotation:
  paths:
    sample_ref_file: config/sample_ref_file.tsv
    reference_manifest: references/manifests/reference_materialization_manifest.resolved.tsv
    fasta_dir: references/variant_calling/Ref_chrM
    output_dir: results/qc/mitos2_annotation
    mitos2_raw_dir: results/qc/mitos2_annotation/raw
    mitos2_parsed_dir: results/qc/mitos2_annotation/parsed
    mitos2_cds_table: results/qc/mitos2_annotation/all_mitos2_position_codon_table.tsv
    mitos2_feature_table: results/qc/mitos2_annotation/all_mitos2_features.tsv
    mitos2_summary_table: results/qc/mitos2_annotation/mitos2_annotation_summary.tsv
    genbank_mitos2_comparison_table: results/qc/codon_table_build/genbank_vs_mitos2_cds_comparison.tsv
  settings:
    enabled: true
    run_for_all_references: true
    overwrite_existing: false
    threads: 4
    # MITOS2 is called through conda activate mitos2.
    use_conda: true
    conda_module: miniconda/24.11.3
    conda_env: mitos2
    # Commands may vary by installation; detect available command after activation.
    mitos2_command_candidates: "mitos2,mitos,runmitos.py"
    genetic_code: 2
    # MITOS2 tRNA/rRNA results are interval annotations only.
    accepted_feature_types: "CDS,gene,tRNA,rRNA"
