# Edit these paths before running preprocessing/scripts/run_preprocessing.sh.
species_table: "data/metadata/all_species_list.txt"
mito_fasta: "/home/lt692/scratch_pi_njl27/lt692/primate_external_data/mitochondrion.1.1.genomic.fna.gz"
tree_newick: "/home/lt692/scratch_pi_njl27/lt692/primate_external_data/primate_tree.nwk"
reference_discovery_outdir: "results/preprocessing/reference_discovery"
email: "your_email@yale.edu"
max_nearest: 200
delay: 0.34
# Number of target species to analyze concurrently during reference discovery.
# Keep at 1 for the most conservative NCBI/DNAZoo access; increase cautiously on HPC.
reference_discovery_threads: 1

# Optional HPC environment setup. Point this to a shell script that loads modules
# or activates a conda environment before preprocessing checks required commands.
# Example setup script contents:
#   module load R samtools wget
#   # or: source /path/to/miniconda3/etc/profile.d/conda.sh && conda activate primate-mtdna
environment_setup_script: "config/preprocessing_hpc_env.sh"
# rscript_command: "Rscript"
# python_command: "python3"
# wget_command: "wget"
# samtools_command: "samtools"
# bwa_command: "bwa"
# gatk_command: "gatk"
# curl_command: "curl"
# efetch_command: "efetch"

# Reviewed reference-discovery manifest used after manual review.
species_reference_summary: "data/metadata/species_reference_chrM_summary.tsv"

# Reviewed/reference-level manifests and variant-calling reference package output.
reference_materialization_results_manifest: "results/preprocessing/reference_materialization/reference_materialization_manifest.tsv"
reference_materialization_manifest: "references/manifests/reference_materialization_manifest.tsv"
in_house_score_reference_inputs: "references/manifests/in_house_score_reference_inputs.tsv"
merged_in_house_score: "results/preprocessing/in_house_score/merged_in_house_score.tsv"

# NUMT mask selection scope for the in-house score step.
# mask_ref_types is a comma-separated list of REF_TYPE values that should receive
# final minimal NUMT masks when candidate fragments pass the thresholds. Including
# #A requires a_mask_mode: "mask_if_requested"; otherwise #A rows remain diagnostic-only.
numt_target_chrm_cov: 0.95
mask_ref_types: "#C-likely_comp,#C-Ambiguous,#A"
a_mask_mode: "mask_if_requested"
# Number of species/reference packages to build concurrently in the variant_references step.
# With Slurm, this is the job-array % concurrency limit; locally, it is worker count.
variant_reference_threads: 100
# Per-job Slurm resources for variant_references array tasks.
variant_reference_slurm_time: "24:00:00"
variant_reference_slurm_cpus: 4
variant_reference_slurm_mem: "32G"
variant_calling_reference_out_root: "references/variant_calling"
