[paths]
# Directory for all generated coordinate-liftover outputs.
output_dir = qc_analysis/01_coordinate_liftover/output

# Raw, unrotated canonical human chrM FASTA.
human_fasta = data/reference_tables/human_chrM.fa

# TSV with one row per sample. Minimal required columns: sample, species.
# With this minimal format, the workflow resolves files from the directories below:
#   species FASTA: {species_fasta_dir}/{species}.fa (or configured extension)
#   VCF:           unique file in vcf_dir matching vcf_pattern
#   COV:           unique file in cov_dir matching cov_pattern
# Backward-compatible explicit columns are also supported: species_fasta, vcf, cov.
# Optional columns: species_chrom, rotate_anchor, target_sequence.
sample_ref_file = config/sample_ref_file.tsv

# Input directories used when sample_ref_file contains only sample/species.
species_fasta_dir = data/species_chrM_fastas
species_fasta_extensions = .fa,.fasta,.fna
vcf_dir = /home/lt692/scratch_pi_njl27/lt692/primate_results_test/new/VCF
vcf_pattern = {sample}*.vcf
cov_dir = /home/lt692/scratch_pi_njl27/lt692/primate_results_test/new/COV
cov_pattern = {sample}*.tsv

# Alternative to sample_ref_file: comma-separated sample names plus per-sample sections
# named [sample:SAMPLE_NAME]. Sections can provide species only, or explicit
# species_fasta, vcf, and cov paths.
samples =

# Optional rotate-position TSV override. Columns: sample, rotate_anchor.
rotate_pos_file =

[coordinates]
# Human canonical chrM length and restore offset used to convert rotated human
# coordinates back to canonical coordinates. For rCRS chrM, length is 16569.
human_len = 16569
human_restore_offset = 0
target_chrom = chrM

# Optional 1-based anchor for human rotation. If blank, the script infers an
# anchor by sequence matching to each species; if matching fails, position 1 is used.
human_rotate_anchor =

[fasta]
# Optional sequence identifier to select from multi-record human FASTA.
human_target_sequence =
# Default target sequence name used in prepared FASTAs.
human_sequence_name = human_chrM
species_sequence_name_template = {sample}_chrM

[alignment]
aligner = mafft
aligner_options = --auto --quiet
# Load MAFFT through the HPC conda environment before running the aligner.
# The workflow executes:
#   module load miniconda/24.11.3
#   source "$(conda info --base)/etc/profile.d/conda.sh"
#   conda activate mafft_env
use_conda_env = true
module_load = miniconda/24.11.3
conda_env = mafft_env
# If true and the external aligner is unavailable, write a deterministic simple
# ungapped pairwise alignment so small smoke tests can still exercise the module.
allow_simple_alignment_fallback = true

[liftover]
check_ref_against_human_fasta = true
fail_on_ref_mismatch = false
